<!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Combo box</title>
    </head>
    <body>
        <b>Years</b>
        <select name="Years" multiple size="1">
            <option>2020
            <option>2021
            <option>2022
            <option>2023
        </select>
        <b>Month</b>
        <select name="Month" multiple size="1">
            <option>February
            <option>March
            <option>April
            <option>May
        </select>
        <b>Day</b>
        <select name="Day" multiple size="1">
            <option>Monday
            <option>Tuesday
            <option>Wednesday
            <option>Wednesday
        </select>
        <b>Date</b>
        <select name="Date" multiple size="1">
            <option>01
            <option>02
            <option>03
            <option>04
        </select>
    </body>
</html>
